<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Subtle background circle -->
  <circle cx="24" cy="24" r="20" fill="#0d7377" opacity="0.08"/>

  <!-- Left hand/arm -->
  <path d="M8 28 L14 24 L20 24" stroke="#0d7377" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Right hand/arm -->
  <path d="M40 28 L34 24 L28 24" stroke="#f0a04b" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Handshake clasp -->
  <path d="M20 24 Q22 20 24 22 Q26 24 28 24" stroke="#0d7377" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Thumb detail left -->
  <path d="M21 24 Q22 27 24 26" stroke="#0d7377" stroke-width="2" stroke-linecap="round" fill="none"/>

  <!-- Thumb detail right -->
  <path d="M27 24 Q26 27 24 26" stroke="#f0a04b" stroke-width="2" stroke-linecap="round" fill="none"/>

  <!-- Connection sparks -->
  <circle cx="24" cy="16" r="1.5" fill="#f0a04b"/>
  <circle cx="19" cy="17.5" r="1" fill="#0d7377" opacity="0.6"/>
  <circle cx="29" cy="17.5" r="1" fill="#f0a04b" opacity="0.6"/>

  <!-- Small upward arrow — opportunity -->
  <path d="M24 14 L24 10" stroke="#f0a04b" stroke-width="2" stroke-linecap="round"/>
  <path d="M21.5 12 L24 9.5 L26.5 12" stroke="#f0a04b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Base line -->
  <path d="M12 34 Q18 31 24 34 Q30 37 36 34" stroke="#0d7377" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.2"/>
</svg>
