<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="grad" x1="16" y1="14" x2="16" y2="30" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#14919b"/>
      <stop offset="1" stop-color="#5bbcad"/>
    </linearGradient>
    <!-- Clip: only show bottom link where it overlaps in front of top link -->
    <clipPath id="clip-bottom-front">
      <rect x="0" y="0" width="12.25" height="32"/>
      <rect x="19.75" y="0" width="12.25" height="32"/>
      <rect x="12.25" y="17" width="7.5" height="15"/>
      <rect x="12.25" y="0" width="7.5" height="13"/>
    </clipPath>
  </defs>

  <!-- Top chain link (dark navy/teal) - drawn first, full shape -->
  <rect x="9.25" y="1.5" width="13.5" height="17" rx="6.75" fill="none" stroke="#1a3a4a" stroke-width="3.2"/>

  <!-- Bottom chain link (teal-green gradient) - clipped so middle overlaps correctly -->
  <rect x="9.25" y="13.5" width="13.5" height="17" rx="6.75" fill="none" stroke="url(#grad)" stroke-width="3.2" clip-path="url(#clip-bottom-front)"/>

  <!-- Re-draw the bottom portion of the bottom link on top for interlock -->
  <path d="M9.25 20.25a6.75 6.75 0 0 0 6.75 6.75v0a6.75 6.75 0 0 0 6.75-6.75" fill="none" stroke="url(#grad)" stroke-width="3.2"/>

  <!-- Palm tree inside top link -->
  <g transform="translate(14, 5)" opacity="0.9">
    <!-- Trunk -->
    <line x1="2" y1="10" x2="2.8" y2="4" stroke="#1a3a4a" stroke-width="1.2" stroke-linecap="round"/>
    <!-- Left frond -->
    <path d="M2.5 4.5C1 3.5-0.5 3.5-0.5 3.5s1.5 0 3 0.8" stroke="#1a3a4a" stroke-width="1" stroke-linecap="round" fill="none"/>
    <!-- Right frond -->
    <path d="M2.5 4.5C4 3.5 5.5 3.5 5.5 3.5s-1.5 0-3 0.8" stroke="#1a3a4a" stroke-width="1" stroke-linecap="round" fill="none"/>
    <!-- Center frond -->
    <path d="M2.6 4.5C2.2 3 2.5 1.5 2.5 1.5s0.5 1.2 0.5 2.8" stroke="#1a3a4a" stroke-width="1" stroke-linecap="round" fill="none"/>
  </g>
</svg>
